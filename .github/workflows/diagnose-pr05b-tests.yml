name: Diagnose PR05-B tests

on:
  push:
    branches:
      - feat/pr-05b-streaming-responses

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/pr-05b-streaming-responses
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run unit tests and capture diagnostics
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace testDebugUnitTest 2>&1 | tee /tmp/pr05b-test.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr05b-test-diagnostics
          path: |
            /tmp/pr05b-test.log
            app/build/test-results/testDebugUnitTest/**
            app/build/reports/tests/testDebugUnitTest/**
          if-no-files-found: warn
          retention-days: 2

      - name: Remove diagnostic workflow
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/diagnose-pr05b-tests.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: remove PR05-B diagnostic workflow"
            git push origin HEAD:feat/pr-05b-streaming-responses
          fi
