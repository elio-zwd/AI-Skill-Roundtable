name: Export source snapshot

on:
  push:
    branches:
      - refactor/pr-04-package-branding
  pull_request:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: source-snapshot
          path: |
            .github/**
            app/**
            docs/**
            gradle/**
            tools/**
            workspace/**
            AGENTS.md
            README.md
            LICENSE
            build.gradle.kts
            settings.gradle.kts
            gradle.properties
            gradlew
            gradlew.bat
            run.ps1
            .gitignore
            .env.example
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1
