name: Apply PR04-E package migration

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: pr04e-package-migration
  cancel-in-progress: false

jobs:
  migrate:
    if: github.head_ref == 'refactor/pr-04-package-branding'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: refactor/pr-04-package-branding
          fetch-depth: 0

      - name: Apply reviewed migration
        run: python3 tools/apply_pr04e_migration.py

      - name: Remove temporary migration files
        shell: bash
        run: |
          rm -f tools/apply_pr04e_migration.py
          rm -f .github/workflows/export-source-snapshot.yml

      - name: Commit migrated source tree
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git status --short

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: migrate official package and app branding"
          git push origin HEAD:refactor/pr-04-package-branding
