name: PR05-A Apply Reviewed Lifecycle Changes

on:
  push:
    branches:
      - fix/pr-05a-request-lifecycle

permissions:
  contents: write

concurrency:
  group: pr05a-apply-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout reviewed branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: fix/pr-05a-request-lifecycle

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode and apply reviewed PR05-A changes
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/pr05a.b64 <<'PAYLOAD'

PAYLOAD
          base64 --decode /tmp/pr05a.b64 | gzip --decompress > /tmp/apply_pr05a.py
          python /tmp/apply_pr05a.py
          rm .github/workflows/pr05a-apply.yml

      - name: Verify patch formatting
        run: git diff --check

      - name: Compile and run unit tests
        run: ./gradlew --no-daemon --stacktrace compileDebugKotlin testDebugUnitTest

      - name: Commit reviewed changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: harden roundtable request lifecycle"
          git push origin HEAD:fix/pr-05a-request-lifecycle
