name: Android CI

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-reviewed-pr05a:
    if: github.head_ref == 'fix/pr-05a-request-lifecycle'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout PR05-A branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          validate-wrappers: true

      - name: Decode and apply reviewed changes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import gzip
          from pathlib import Path

          workflow = Path('.github/workflows/pr05a-apply.yml').read_text(encoding='utf-8')
          payload = workflow.split("<<'PAYLOAD'\n", 1)[1].split('\nPAYLOAD', 1)[0]
          Path('/tmp/apply_pr05a.py').write_bytes(gzip.decompress(base64.b64decode(payload)))
          PY
          python /tmp/apply_pr05a.py
          python - <<'PY'
          from pathlib import Path

          path = Path('app/src/main/java/com/elio/skillroundtable/viewmodel/RoundtableViewModel.kt')
          text = path.read_text(encoding='utf-8')
          broken = 'joinToString("' + '\n' + '")'
          fixed = 'joinToString("\\n")'
          if text.count(broken) != 1:
              raise SystemExit(f'Expected exactly one broken joinToString literal, found {text.count(broken)}')
          path.write_text(text.replace(broken, fixed, 1), encoding='utf-8')
          PY
          rm -f .github/workflows/pr05a-apply.yml
          rm -f docs/planning/pr05a-trigger.txt

      - name: Restore permanent CI definition
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- .github/workflows/android-ci.yml

      - name: Verify formatting
        run: git diff --check

      - name: Compile and run unit tests with captured log
        id: gradle_check
        shell: bash
        run: |
          set -uo pipefail
          chmod +x gradlew
          set +e
          ./gradlew --no-daemon --stacktrace compileDebugKotlin testDebugUnitTest > /tmp/pr05a-gradle.log 2>&1
          status=$?
          set -e
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          tail -n 200 /tmp/pr05a-gradle.log
          exit 0

      - name: Upload PR05-A diagnostic artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr05a-diagnostics-${{ github.run_attempt }}
          path: |
            /tmp/pr05a-gradle.log
            app/src/main/java/com/elio/skillroundtable/data/ChatSession.kt
            app/src/main/java/com/elio/skillroundtable/network/GeminiApi.kt
            app/src/main/java/com/elio/skillroundtable/roundtable/RoundtableOrchestrator.kt
            app/src/main/java/com/elio/skillroundtable/viewmodel/RoundtableViewModel.kt
            app/src/main/java/com/elio/skillroundtable/MainActivity.kt
            app/src/test/java/com/elio/skillroundtable/network/retry/ApiRetryPolicyTest.kt
            app/src/test/java/com/elio/skillroundtable/roundtable/RoundtableOrchestratorTest.kt
            app/src/test/java/com/elio/skillroundtable/viewmodel/RoundtableRunFeedbackTest.kt
          if-no-files-found: error
          retention-days: 7

      - name: Stop before commit when verification failed
        if: steps.gradle_check.outputs.status != '0'
        run: exit 1

      - name: Commit reviewed PR05-A changes
        if: steps.gradle_check.outputs.status == '0'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: harden roundtable request lifecycle'
          git push origin HEAD:fix/pr-05a-request-lifecycle
