name: Android CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle and validate wrapper
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          validate-wrappers: true

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Show Gradle environment
        run: ./gradlew --no-daemon --version

      - name: Compile debug Kotlin
        run: ./gradlew --no-daemon --stacktrace compileDebugKotlin

      - name: Run debug unit tests
        run: ./gradlew --no-daemon --stacktrace testDebugUnitTest

      - name: Run debug lint
        run: ./gradlew --no-daemon --stacktrace lintDebug

      - name: Assemble debug APK
        run: ./gradlew --no-daemon --stacktrace assembleDebug

      - name: Assemble release APK
        run: ./gradlew --no-daemon --stacktrace assembleRelease

      - name: Upload test and lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-reports-${{ github.run_attempt }}
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
            app/build/test-results/testDebugUnitTest/**
            app/build/reports/tests/testDebugUnitTest/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.run_attempt }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.run_attempt }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore
          retention-days: 7
