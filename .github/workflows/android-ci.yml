name: Android CI

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-startup-cleanup-ordering:
    if: github.head_ref == 'fix/pr-05a-request-lifecycle'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout PR05-A branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          validate-wrappers: true

      - name: Apply reviewed startup cleanup ordering fix
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('app/src/main/java/com/elio/skillroundtable/viewmodel/RoundtableViewModel.kt')
          lines = path.read_text(encoding='utf-8').splitlines()

          group_line = '    private val groupRepo = com.elio.skillroundtable.data.CharacterGroupRepository(database.characterGroupDao())'
          if lines.count(group_line) != 1:
              raise SystemExit(f'Expected one group repository declaration, found {lines.count(group_line)}')
          group_index = lines.index(group_line)
          cleanup_block = [
              '    private val startupPendingCleanupJob: Job = viewModelScope.launch(Dispatchers.IO) {',
              '        try {',
              '            chatRepo.removeAllPendingMessages()',
              '        } catch (error: Exception) {',
              '            PrivacySafeLogger.e("RoundtableViewModel", "Startup pending-message cleanup failed", error)',
              '        }',
              '    }',
          ]
          if any('startupPendingCleanupJob' in line for line in lines):
              raise SystemExit('startupPendingCleanupJob already exists')
          lines[group_index + 1:group_index + 1] = cleanup_block

          init_cleanup = [
              '        viewModelScope.launch(Dispatchers.IO) {',
              '            chatRepo.removeAllPendingMessages()',
              '        }',
          ]
          matches = [i for i in range(len(lines) - len(init_cleanup) + 1) if lines[i:i + len(init_cleanup)] == init_cleanup]
          if len(matches) != 1:
              raise SystemExit(f'Expected one init cleanup block, found {len(matches)}')
          start = matches[0]
          del lines[start:start + len(init_cleanup)]

          launch_line = '        val job = viewModelScope.launch(start = CoroutineStart.LAZY) {'
          if lines.count(launch_line) != 1:
              raise SystemExit(f'Expected one lazy roundtable launch, found {lines.count(launch_line)}')
          launch_index = lines.index(launch_line)
          if lines[launch_index + 1] != '            block()':
              raise SystemExit(f'Unexpected lazy launch body: {lines[launch_index + 1]!r}')
          lines.insert(launch_index + 1, '            startupPendingCleanupJob.join()')

          path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

      - name: Restore permanent CI definition
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- .github/workflows/android-ci.yml

      - name: Verify formatting and focused build
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace compileDebugKotlin testDebugUnitTest
          chmod -x gradlew

      - name: Commit startup cleanup ordering fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git update-index --chmod=-x gradlew
          git commit -m 'fix: serialize startup pending cleanup'
          git push origin HEAD:fix/pr-05a-request-lifecycle
