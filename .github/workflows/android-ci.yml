name: Android CI

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-reviewed-pr05a:
    if: github.head_ref == 'fix/pr-05a-request-lifecycle'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout PR05-A branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          validate-wrappers: true

      - name: Decode and apply reviewed changes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import gzip
          from pathlib import Path

          workflow = Path('.github/workflows/pr05a-apply.yml').read_text(encoding='utf-8')
          payload = workflow.split("<<'PAYLOAD'\n", 1)[1].split('\nPAYLOAD', 1)[0]
          Path('/tmp/apply_pr05a.py').write_bytes(gzip.decompress(base64.b64decode(payload)))
          PY
          python /tmp/apply_pr05a.py
          rm -f .github/workflows/pr05a-apply.yml
          rm -f docs/planning/pr05a-trigger.txt

      - name: Restore permanent CI definition
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- .github/workflows/android-ci.yml

      - name: Verify formatting
        run: git diff --check

      - name: Compile and run unit tests
        shell: bash
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace compileDebugKotlin testDebugUnitTest

      - name: Commit reviewed PR05-A changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: harden roundtable request lifecycle'
          git push origin HEAD:fix/pr-05a-request-lifecycle
