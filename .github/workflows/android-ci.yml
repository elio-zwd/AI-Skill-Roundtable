name: Android CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle and validate wrapper
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          validate-wrappers: true

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Show Gradle environment
        run: ./gradlew --no-daemon --version

      - name: Compile debug Kotlin
        run: ./gradlew --no-daemon --stacktrace compileDebugKotlin

      - name: Run debug unit tests
        run: ./gradlew --no-daemon --stacktrace testDebugUnitTest

      - name: Run debug lint
        run: ./gradlew --no-daemon --stacktrace lintDebug

      - name: Assemble debug APK
        run: ./gradlew --no-daemon --stacktrace assembleDebug

      - name: Generate ephemeral release test keystore
        shell: bash
        run: |
          set -euo pipefail

          ci_release_password="$(openssl rand -hex 24)"
          echo "::add-mask::${ci_release_password}"
          echo "CI_RELEASE_PASSWORD=${ci_release_password}" >> "${GITHUB_ENV}"

          keytool -genkeypair \
            -keystore "${RUNNER_TEMP}/ci-release-test.jks" \
            -storetype JKS \
            -storepass "${ci_release_password}" \
            -keypass "${ci_release_password}" \
            -alias ci-release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 1 \
            -dname "CN=CI Release Test,OU=CI,O=AI Skill Roundtable,L=Test,ST=Test,C=US"

      - name: Validate optional Gradle release signing configuration
        shell: bash
        run: |
          set -euo pipefail

          export RELEASE_STORE_FILE="${RUNNER_TEMP}/ci-release-test.jks"
          export RELEASE_STORE_PASSWORD="${CI_RELEASE_PASSWORD}"
          export RELEASE_KEY_ALIAS="ci-release"
          export RELEASE_KEY_PASSWORD="${CI_RELEASE_PASSWORD}"

          ./gradlew --no-daemon --stacktrace :app:validateSigningRelease

      - name: Remove ephemeral release test keystore
        if: always()
        shell: bash
        run: rm -f "${RUNNER_TEMP}/ci-release-test.jks"

      - name: Assemble optimized release APK
        run: ./gradlew --no-daemon --stacktrace assembleRelease

      - name: Verify public release APK is unsigned
        shell: bash
        run: |
          set -euo pipefail

          release_apk="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' -print -quit)"
          if [[ -z "${release_apk}" ]]; then
            echo "::error::Release APK was not generated."
            exit 1
          fi

          apksigner="$(find "${ANDROID_HOME}/build-tools" -type f -name apksigner -print | sort -V | tail -n 1)"
          if [[ -z "${apksigner}" ]]; then
            echo "::error::Unable to locate apksigner in the Android SDK."
            exit 1
          fi

          if "${apksigner}" verify "${release_apk}" >/dev/null 2>&1; then
            echo "::error::Public CI release APK is unexpectedly signed."
            exit 1
          fi

          echo "Confirmed unsigned public release APK: ${release_apk}"

      - name: Upload test, lint and R8 reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-reports-${{ github.run_attempt }}
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
            app/build/test-results/testDebugUnitTest/**
            app/build/reports/tests/testDebugUnitTest/**
            app/build/outputs/mapping/release/**
            app/build/outputs/logs/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.run_attempt }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.run_attempt }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore
          retention-days: 7
