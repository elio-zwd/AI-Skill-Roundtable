name: Android CI

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-startup-cleanup-ordering:
    if: github.head_ref == 'fix/pr-05a-request-lifecycle'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout PR05-A branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          validate-wrappers: true

      - name: Apply reviewed startup cleanup ordering fix
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('app/src/main/java/com/elio/skillroundtable/viewmodel/RoundtableViewModel.kt')
          text = path.read_text(encoding='utf-8')

          old_repositories = '''    private val charRepo = com.elio.skillroundtable.data.CharacterRepository(database.characterDao())
              private val chatRepo = com.elio.skillroundtable.data.ChatRepository(database.chatDao())
              private val groupRepo = com.elio.skillroundtable.data.CharacterGroupRepository(database.characterGroupDao())
          '''.replace('              ', '')
          new_repositories = '''    private val charRepo = com.elio.skillroundtable.data.CharacterRepository(database.characterDao())
              private val chatRepo = com.elio.skillroundtable.data.ChatRepository(database.chatDao())
              private val groupRepo = com.elio.skillroundtable.data.CharacterGroupRepository(database.characterGroupDao())
              private val startupPendingCleanupJob: Job = viewModelScope.launch(Dispatchers.IO) {
                  try {
                      chatRepo.removeAllPendingMessages()
                  } catch (error: Exception) {
                      PrivacySafeLogger.e("RoundtableViewModel", "Startup pending-message cleanup failed", error)
                  }
              }
          '''.replace('              ', '')

          old_init = '''        ApiKeyPool.init(context)
              viewModelScope.launch(Dispatchers.IO) {
                  chatRepo.removeAllPendingMessages()
              }
          
          '''.replace('              ', '')
          new_init = '''        ApiKeyPool.init(context)
          
          '''.replace('              ', '')

          old_launch = '''        val job = viewModelScope.launch(start = CoroutineStart.LAZY) {
                  block()
              }
          '''.replace('              ', '')
          new_launch = '''        val job = viewModelScope.launch(start = CoroutineStart.LAZY) {
                  startupPendingCleanupJob.join()
                  block()
              }
          '''.replace('              ', '')

          replacements = [
              (old_repositories, new_repositories, 'repository block'),
              (old_init, new_init, 'init cleanup block'),
              (old_launch, new_launch, 'roundtable launch block'),
          ]
          for old, new, label in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected one {label}, found {count}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Restore permanent CI definition
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- .github/workflows/android-ci.yml

      - name: Verify formatting and focused build
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace compileDebugKotlin testDebugUnitTest
          chmod -x gradlew

      - name: Commit startup cleanup ordering fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git update-index --chmod=-x gradlew
          git commit -m 'fix: serialize startup pending cleanup'
          git push origin HEAD:fix/pr-05a-request-lifecycle
