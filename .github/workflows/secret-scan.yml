name: Secret scan

on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: windows-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan tracked files and reachable history
        shell: pwsh
        run: ./tools/check-secrets.ps1 -IncludeHistory
