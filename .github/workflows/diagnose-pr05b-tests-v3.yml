name: Diagnose PR05-B tests v3

on:
  push:
    branches:
      - feat/pr-05b-streaming-responses

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/pr-05b-streaming-responses
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run unit tests and capture exit status
        shell: bash
        run: |
          set +e
          set -o pipefail
          bash ./gradlew --no-daemon --stacktrace testDebugUnitTest 2>&1 | tee /tmp/pr05b-test.log
          status=${PIPESTATUS[0]}
          echo "$status" > /tmp/pr05b-test-exit.txt
          exit 0

      - name: Write sanitized test summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tools/pr05b-diagnostics
          python - <<'PY'
          import glob
          import os
          import xml.etree.ElementTree as ET

          try:
              exit_code = open('/tmp/pr05b-test-exit.txt', encoding='utf-8').read().strip()
          except OSError:
              exit_code = 'MISSING'
          lines = [f'GRADLE_EXIT {exit_code}']
          failed_count = 0
          for path in sorted(glob.glob('app/build/test-results/testDebugUnitTest/*.xml')):
              try:
                  root = ET.parse(path).getroot()
              except Exception as exc:
                  lines.append(f'XML_PARSE_ERROR {os.path.basename(path)} {type(exc).__name__}')
                  continue
              failures = int(root.attrib.get('failures', '0')) + int(root.attrib.get('errors', '0'))
              if failures == 0:
                  continue
              lines.append(f'SUITE {root.attrib.get("name", os.path.basename(path))} failures={failures}')
              for case in root.findall('.//testcase'):
                  failed = case.find('failure')
                  if failed is None:
                      failed = case.find('error')
                  if failed is None:
                      continue
                  failed_count += 1
                  lines.append(f'TEST {case.attrib.get("classname", "")}.{case.attrib.get("name", "")}')
                  message = (failed.attrib.get('message') or '').replace('\n', ' ').strip()
                  if message:
                      lines.append(f'MESSAGE {message[:1200]}')
                  body = (failed.text or '').strip().splitlines()
                  for item in body[:16]:
                      lines.append(f'TRACE {item[:1200]}')
          lines.append(f'FAILED_CASES {failed_count}')
          if exit_code != '0' and failed_count == 0:
              try:
                  log_lines = open('/tmp/pr05b-test.log', encoding='utf-8', errors='replace').read().splitlines()
              except OSError:
                  log_lines = []
              lines.append('LOG_TAIL_BEGIN')
              for item in log_lines[-180:]:
                  sanitized = item.replace('x-goog-api-key', 'api-key-header')
                  lines.append(sanitized[:1500])
              lines.append('LOG_TAIL_END')
          with open('tools/pr05b-diagnostics/test-summary.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(lines) + '\n')
          PY

      - name: Commit diagnostics and clean workflow
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/diagnose-pr05b-tests-v3.yml
          chmod 644 gradlew
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: refine PR05-B test diagnostics"
          git push origin HEAD:feat/pr-05b-streaming-responses
