name: Diagnose PR05-B tests v2

on:
  push:
    branches:
      - feat/pr-05b-streaming-responses

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/pr-05b-streaming-responses
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run unit tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          bash ./gradlew --no-daemon --stacktrace testDebugUnitTest 2>&1 | tee /tmp/pr05b-test.log

      - name: Write sanitized test summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tools/pr05b-diagnostics
          python - <<'PY'
          import glob
          import os
          import xml.etree.ElementTree as ET

          lines = []
          for path in sorted(glob.glob('app/build/test-results/testDebugUnitTest/*.xml')):
              try:
                  root = ET.parse(path).getroot()
              except Exception as exc:
                  lines.append(f'XML_PARSE_ERROR {os.path.basename(path)} {type(exc).__name__}')
                  continue
              failures = int(root.attrib.get('failures', '0')) + int(root.attrib.get('errors', '0'))
              if failures == 0:
                  continue
              lines.append(f'SUITE {root.attrib.get("name", os.path.basename(path))} failures={failures}')
              for case in root.findall('.//testcase'):
                  failed = case.find('failure') or case.find('error')
                  if failed is None:
                      continue
                  lines.append(f'TEST {case.attrib.get("classname", "")}.{case.attrib.get("name", "")}')
                  message = (failed.attrib.get('message') or '').replace('\n', ' ').strip()
                  if message:
                      lines.append(f'MESSAGE {message[:1000]}')
                  body = (failed.text or '').strip().splitlines()
                  for item in body[:12]:
                      lines.append(f'TRACE {item[:1000]}')
          if not lines:
              lines.append('NO_FAILED_TESTS_FOUND')
          with open('tools/pr05b-diagnostics/test-summary.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(lines) + '\n')
          PY

      - name: Commit diagnostics and restore wrapper mode
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/diagnose-pr05b-tests-v2.yml
          chmod 644 gradlew
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: capture PR05-B test diagnostics"
          git push origin HEAD:feat/pr-05b-streaming-responses
