name: Diagnose PR05-B test compile

on:
  push:
    branches:
      - feat/pr-05b-streaming-responses

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/pr-05b-streaming-responses
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v6
      - name: Capture Kotlin test compiler diagnostics
        shell: bash
        run: |
          set +e
          set -o pipefail
          bash ./gradlew --no-daemon --console=plain compileDebugUnitTestKotlin 2>&1 | tee /tmp/pr05b-compile.log
          status=${PIPESTATUS[0]}
          {
            echo "GRADLE_EXIT $status"
            grep -E '(^e: |^error: |\.kt:[0-9]+:[0-9]+)' /tmp/pr05b-compile.log || true
          } > tools/pr05b-diagnostics/test-summary.txt
          exit 0
      - name: Commit diagnostics and clean workflow
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/diagnose-pr05b-compile.yml
          chmod 644 gradlew
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: capture PR05-B compiler diagnostics"
          git push origin HEAD:feat/pr-05b-streaming-responses
