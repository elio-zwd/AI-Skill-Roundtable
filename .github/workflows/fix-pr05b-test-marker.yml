name: Fix PR05-B test marker

on:
  push:
    branches:
      - feat/pr-05b-streaming-responses

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/pr-05b-streaming-responses
          fetch-depth: 0
      - name: Apply guarded fix and clean diagnostics
        shell: bash
        run: |
          set -euo pipefail
          file='app/src/test/java/com/elio/skillroundtable/roundtable/RoundtableOrchestratorTest.kt'
          test "$(grep -c '^\*+        val result = orchestrator.runRoundtableSequence(1L, 1001L, false)$' "$file")" -eq 1
          sed -i 's/^\*+        val result = orchestrator.runRoundtableSequence(1L, 1001L, false)$/        val result = orchestrator.runRoundtableSequence(1L, 1001L, false)/' "$file"
          rm -rf tools/pr05b-diagnostics
          rm -f .github/workflows/fix-pr05b-test-marker.yml
          chmod 644 gradlew
          git diff --check
      - name: Commit fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: fix PR05-B streaming regression case"
          git push origin HEAD:feat/pr-05b-streaming-responses
